spring.application.name=booking

# DB config: env vars override local defaults (used inside containers / OpenShift)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/movie_booking_db?createDatabaseIfNotExist=true}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:moviebooking_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:moviebooking}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# JWT — override the secret in production via env var
jwt.secret=${JWT_SECRET:ThisIsMySuperSecretKeyForMovieBookingAppChangeInProd12345}
jwt.expiration=${JWT_EXPIRATION:86400000}
